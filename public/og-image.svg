      <stop offset="0%"  stop-color="#FAF8F2"/>
      <stop offset="100%" stop-color="#F2EBE0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#CFC1AF" stroke-width="2" rx="12"/>

  <text x="100" y="170"
